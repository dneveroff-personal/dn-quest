server:
  port: 8087
  servlet:
    context-path: /api/stats

spring:
  application:
    name: statistics-service
  
  profiles:
    active: dev
  
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/dnquest_stats}
    username: ${DATABASE_USERNAME:dn}
    password: ${DATABASE_PASSWORD:dn}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      pool-name: DNQuestStatsHikariCP
      max-lifetime: 1200000
      connection-timeout: 20000
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
        default_schema: statistics
  
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    schemas: statistics
    default-schema: statistics
  
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=1000, expireAfterWrite=30m
  
  # Kafka Configuration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: statistics-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "dn.quest.shared.events"
        spring.json.value.default.type: "dn.quest.shared.events.BaseEvent"
        spring.json.type.mapping: "UserRegisteredEvent:dn.quest.shared.events.user.UserRegisteredEvent,UserUpdatedEvent:dn.quest.shared.events.user.UserUpdatedEvent,UserDeletedEvent:dn.quest.shared.events.user.UserDeletedEvent,QuestCreatedEvent:dn.quest.shared.events.quest.QuestCreatedEvent,QuestUpdatedEvent:dn.quest.shared.events.quest.QuestUpdatedEvent,QuestPublishedEvent:dn.quest.shared.events.quest.QuestPublishedEvent,QuestDeletedEvent:dn.quest.shared.events.quest.QuestDeletedEvent,GameSessionStartedEvent:dn.quest.shared.events.game.GameSessionStartedEvent,GameSessionFinishedEvent:dn.quest.shared.events.game.GameSessionFinishedEvent,CodeSubmittedEvent:dn.quest.shared.events.game.CodeSubmittedEvent,LevelCompletedEvent:dn.quest.shared.events.game.LevelCompletedEvent,TeamCreatedEvent:dn.quest.shared.events.team.TeamCreatedEvent,TeamUpdatedEvent:dn.quest.shared.events.team.TeamUpdatedEvent,TeamMemberAddedEvent:dn.quest.shared.events.team.TeamMemberAddedEvent,TeamMemberRemovedEvent:dn.quest.shared.events.team.TeamMemberRemovedEvent,FileUploadedEvent:dn.quest.shared.events.file.FileUploadedEvent,FileUpdatedEvent:dn.quest.shared.events.file.FileUpdatedEvent,FileDeletedEvent:dn.quest.shared.events.file.FileDeletedEvent"
      enable-auto-commit: false
      max-poll-records: 100
      fetch-min-size: 1
      fetch-max-wait: 500ms
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.type.mapping: "BaseEvent:dn.quest.shared.events.BaseEvent"
    listener:
      ack-mode: manual_immediate
      concurrency: 3
      poll-timeout: 3000ms

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:dnQuestSecretKeyForJWTTokenGenerationAndValidation2024}

# Application specific configuration
app:
  kafka:
    topics:
      user-events: ${USER_EVENTS_TOPIC:dn-quest.users.events}
      quest-events: ${QUEST_EVENTS_TOPIC:dn-quest.quests.events}
      game-events: ${GAME_EVENTS_TOPIC:dn-quest.game.events}
      team-events: ${TEAM_EVENTS_TOPIC:dn-quest.teams.events}
      file-events: ${FILE_EVENTS_TOPIC:dn-quest.files.events}
      statistics-events: ${STATISTICS_EVENTS_TOPIC:dn-quest.statistics.events}
  statistics:
    aggregation:
      enabled: true
      batch-size: 1000
      interval-ms: 60000 # 1 minute
    cache:
      ttl-minutes: 30
      max-size: 10000
    leaderboard:
      update-interval-minutes: 15
      max-entries: 1000
    cleanup:
      enabled: true
      retention-days: 365

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    dn.quest.statistics: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

---
spring:
  config:
    activate:
      on-profile: dev
  
  jpa:
    show-sql: true

logging:
  level:
    dn.quest.statistics: DEBUG

---
spring:
  config:
    activate:
      on-profile: prod
  
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
  
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}

logging:
  level:
    dn.quest.statistics: INFO
  file:
    name: /var/log/dn-quest/statistics-service.log

---
spring:
  config:
    activate:
      on-profile: test
  
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
  
  h2:
    console:
      enabled: true

logging:
  level:
    dn.quest.statistics: DEBUG