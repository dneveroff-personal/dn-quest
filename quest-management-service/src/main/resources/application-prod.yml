spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://postgres-quests:5432/dnquest_quests}
    username: ${DATABASE_USERNAME:dn}
    password: ${DATABASE_PASSWORD:dn}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 20000
      leak-detection-threshold: 60000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
        connection:
          provider_disables_autocommit: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
    out-of-order: false

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:29092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 5
      batch-size: 32768
      linger-ms: 5
      buffer-memory: 67108864
      compression-type: snappy
    consumer:
      group-id: quest-management-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.value.default.type: "dn.quest.questmanagement.event.QuestEvent"
      auto-offset-reset: earliest
      enable-auto-commit: false
      max-poll-records: 500
      fetch-min-bytes: 1
      fetch-max-wait: 500

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=5000,expireAfterWrite=10m,recordStats

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${AUTH_SERVICE_URL:http://authentication-service:8081}

# Feign clients configuration
feign:
  client:
    config:
      default:
        connectTimeout: 10000
        readTimeout: 30000
        loggerLevel: none
      authentication-service:
        url: ${AUTH_SERVICE_URL:http://authentication-service:8081}
        connectTimeout: 5000
        readTimeout: 10000
        loggerLevel: basic
      user-management-service:
        url: ${USER_SERVICE_URL:http://user-management-service:8082}
        connectTimeout: 5000
        readTimeout: 15000
        loggerLevel: basic
      file-storage-service:
        url: ${FILE_STORAGE_SERVICE_URL:http://file-storage-service:8088}
        connectTimeout: 10000
        readTimeout: 30000
        loggerLevel: basic
      statistics-service:
        url: ${STATISTICS_SERVICE_URL:http://statistics-service:8087}
        connectTimeout: 5000
        readTimeout: 15000
        loggerLevel: basic
    httpclient:
      enabled: true
      max-connections: 200
      max-connections-per-route: 50

# Application configuration
app:
  quest:
    validation:
      max-levels-per-quest: 100
      max-codes-per-level: 20
      max-hints-per-level: 10
      max-media-per-quest: 50
      max-file-size-mb: 50
    versioning:
      max-versions-per-quest: 20
    search:
      max-search-results: 1000
    rating:
      min-rating: 1
      max-rating: 5

# Logging configuration
logging:
  level:
    dn.quest.questmanagement: INFO
    org.springframework.web: WARN
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
    org.springframework.kafka: WARN
    feign: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: /app/logs/quest-management-service.log
    max-size: 100MB
    max-history: 30

# Management endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      group:
        readiness:
          include: db,kafka
        liveness:
          include: db
  metrics:
    export:
      prometheus:
        enabled: true
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5,0.9,0.95,0.99
  info:
    env:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true

# Server configuration
server:
  port: ${SERVER_PORT:8083}
  servlet:
    context-path: /api/quests
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain
    min-response-size: 1024
  http2:
    enabled: true
  error:
    include-message: never
    include-binding-errors: never

# Resilience4j configuration
resilience4j:
  circuitbreaker:
    instances:
      authentication-service:
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        sliding-window-size: 10
        minimum-number-of-calls: 5
      user-management-service:
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        sliding-window-size: 10
        minimum-number-of-calls: 5
      file-storage-service:
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        sliding-window-size: 10
        minimum-number-of-calls: 5
      statistics-service:
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        sliding-window-size: 10
        minimum-number-of-calls: 5
  retry:
    instances:
      authentication-service:
        max-attempts: 3
        wait-duration: 1s
        retry-exceptions:
          - java.net.SocketTimeoutException
          - java.io.IOException
      user-management-service:
        max-attempts: 3
        wait-duration: 1s
        retry-exceptions:
          - java.net.SocketTimeoutException
          - java.io.IOException
      file-storage-service:
        max-attempts: 3
        wait-duration: 2s
        retry-exceptions:
          - java.net.SocketTimeoutException
          - java.io.IOException
      statistics-service:
        max-attempts: 3
        wait-duration: 1s
        retry-exceptions:
          - java.net.SocketTimeoutException
          - java.io.IOException