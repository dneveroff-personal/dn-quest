spring:
  datasource:
    url: jdbc:postgresql://postgres-dev:5432/dnquest_quests
    username: dn
    password: dn
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
        default_schema: quests

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: false
    schemas: quests
    default-schema: quests

  kafka:
    bootstrap-servers: kafka-dev:29092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      batch-size: 16384
      linger-ms: 1
      buffer-memory: 33554432
    consumer:
      group-id: quest-management-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.value.default.type: "dn.quest.questmanagement.event.QuestEvent"
      auto-offset-reset: earliest
      enable-auto-commit: false
      max-poll-records: 100

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=5m

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://authentication-service-dev:8081

# Feign clients configuration
feign:
  client:
    config:
      authentication-service:
        url: http://authentication-service-dev:8081
        connectTimeout: 5000
        readTimeout: 10000
        loggerLevel: basic
      user-management-service:
        url: http://user-management-service:8082
        connectTimeout: 5000
        readTimeout: 10000
        loggerLevel: basic
      file-storage-service:
        url: http://file-storage-service:8088
        connectTimeout: 5000
        readTimeout: 15000
        loggerLevel: basic
      statistics-service:
        url: http://statistics-service:8087
        connectTimeout: 5000
        readTimeout: 10000
        loggerLevel: basic

# Application configuration
app:
  quest:
    validation:
      max-levels-per-quest: 50
      max-codes-per-level: 10
      max-hints-per-level: 5
      max-media-per-quest: 20
      max-file-size-mb: 10
    versioning:
      max-versions-per-quest: 10
    search:
      max-search-results: 100
    rating:
      min-rating: 1
      max-rating: 5

# Logging configuration
logging:
  level:
    dn.quest.questmanagement: DEBUG
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.springframework.kafka: INFO
    feign: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Management endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

# Server configuration
server:
  port: 8083
  servlet:
    context-path: /api/quests
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain