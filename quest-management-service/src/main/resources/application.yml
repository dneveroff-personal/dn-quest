spring:
  application:
    name: quest-management-service
  
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  
  config:
    import: optional:file:./config/application.yml

  # Database configuration
  datasource:
    driver-class-name: org.postgresql.Driver
  
  # JPA configuration
  jpa:
    open-in-view: false
    properties:
      hibernate:
        generate_statistics: false
        jdbc:
          time_zone: UTC
  
  # Flyway configuration
  flyway:
    enabled: true
    baseline-on-migrate: true
    validate-on-migrate: true
  
  # Kafka configuration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092,localhost:9093,localhost:9094}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      batch-size: 16384
      linger-ms: 1
      buffer-memory: 33554432
      compression-type: snappy
      enable-idempotence: true
    consumer:
      group-id: quest-management-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "dn.quest.shared.events,dn.quest.shared.events.user,dn.quest.shared.events.quest,dn.quest.shared.events.game,dn.quest.shared.events.team,dn.quest.shared.events.file,dn.quest.shared.events.notification"
        spring.json.value.default.type: "dn.quest.shared.events.BaseEvent"
        spring.json.use.type.headers: false
      auto-offset-reset: earliest
      enable-auto-commit: false
      max-poll-records: 500
      session-timeout-ms: 30000
      heartbeat-interval-ms: 10000
      isolation-level: read_committed
    listener:
      ack-mode: manual_immediate
      concurrency: 3
      poll-timeout: 3000
      idle-between-polls: 1000
  
  # Cache configuration
  cache:
    type: caffeine
  
  # Security configuration
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${AUTH_SERVICE_URL:http://localhost:8081}

# Feign configuration
feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 10000
        loggerLevel: none
      authentication-service:
        url: ${AUTH_SERVICE_URL:http://localhost:8081}
        connectTimeout: 5000
        readTimeout: 10000
        loggerLevel: basic
      user-management-service:
        url: ${USER_SERVICE_URL:http://localhost:8082}
        connectTimeout: 5000
        readTimeout: 10000
        loggerLevel: basic
      file-storage-service:
        url: ${FILE_STORAGE_SERVICE_URL:http://localhost:8088}
        connectTimeout: 5000
        readTimeout: 15000
        loggerLevel: basic
      statistics-service:
        url: ${STATISTICS_SERVICE_URL:http://localhost:8087}
        connectTimeout: 5000
        readTimeout: 10000
        loggerLevel: basic

# Application configuration
app:
  quest:
    validation:
      max-levels-per-quest: 50
      max-codes-per-level: 10
      max-hints-per-level: 5
      max-media-per-quest: 20
      max-file-size-mb: 10
    versioning:
      max-versions-per-quest: 10
    search:
      max-search-results: 100
    rating:
      min-rating: 1
      max-rating: 5

# Logging configuration
logging:
  level:
    dn.quest.questmanagement: INFO
    org.springframework.web: INFO
    org.springframework.security: INFO
    org.hibernate.SQL: WARN
    org.springframework.kafka: INFO
    feign: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Management endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true

# Server configuration
server:
  port: ${SERVER_PORT:8083}
  servlet:
    context-path: /api/quests
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain