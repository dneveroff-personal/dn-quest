version: '3.8'

# DN Quest - Optimized Microservices Configuration
# This file provides an optimized configuration for development and production

services:
  # ===========================================
  # Infrastructure Services
  # ===========================================

  # PostgreSQL databases for each microservice
  postgres-auth:
    image: postgres:16-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-dn-quest}-postgres-auth
    environment:
      POSTGRES_DB: ${POSTGRES_AUTH_DB:-dnquest_auth}
      POSTGRES_USER: ${POSTGRES_USER:-dn}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dn}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    ports:
      - "${POSTGRES_AUTH_PORT:-5432}:5432"
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    networks:
      - ${DOCKER_NETWORK:-dn-quest-network}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dn} -d ${POSTGRES_AUTH_DB:-dnquest_auth}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  postgres-users:
    image: postgres:16-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-dn-quest}-postgres-users
    environment:
      POSTGRES_DB: ${POSTGRES_USERS_DB:-dnquest_users}
      POSTGRES_USER: ${POSTGRES_USER:-dn}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dn}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    ports:
      - "${POSTGRES_USERS_PORT:-5433}:5432"
    volumes:
      - postgres_users_data:/var/lib/postgresql/data
    networks:
      - ${DOCKER_NETWORK:-dn-quest-network}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dn} -d ${POSTGRES_USERS_DB:-dnquest_users}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  postgres-quests:
    image: postgres:16-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-dn-quest}-postgres-quests
    environment:
      POSTGRES_DB: ${POSTGRES_QUESTS_DB:-dnquest_quests}
      POSTGRES_USER: ${POSTGRES_USER:-dn}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dn}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    ports:
      - "${POSTGRES_QUESTS_PORT:-5434}:5432"
    volumes:
      - postgres_quests_data:/var/lib/postgresql/data
    networks:
      - ${DOCKER_NETWORK:-dn-quest-network}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dn} -d ${POSTGRES_QUESTS_DB:-dnquest_quests}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  postgres-game:
    image: postgres:16-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-dn-quest}-postgres-game
    environment:
      POSTGRES_DB: ${POSTGRES_GAME_DB:-dnquest_game}
      POSTGRES_USER: ${POSTGRES_USER:-dn}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dn}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    ports:
      - "${POSTGRES_GAME_PORT:-5435}:5432"
    volumes:
      - postgres_game_data:/var/lib/postgresql/data
    networks:
      - ${DOCKER_NETWORK:-dn-quest-network}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dn} -d ${POSTGRES_GAME_DB:-dnquest_game}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  postgres-teams:
    image: postgres:16-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-dn-quest}-postgres-teams
    environment:
      POSTGRES_DB: ${POSTGRES_TEAMS_DB:-dnquest_teams}
      POSTGRES_USER: ${POSTGRES_USER:-dn}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dn}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    ports:
      - "${POSTGRES_TEAMS_PORT:-5436}:5432"
    volumes:
      - postgres_teams_data:/var/lib/postgresql/data
    networks:
      - ${DOCKER_NETWORK:-dn-quest-network}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dn} -d ${POSTGRES_TEAMS_DB:-dnquest_teams}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  postgres-notifications:
    image: postgres:16-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-dn-quest}-postgres-notifications
    environment:
      POSTGRES_DB: ${POSTGRES_NOTIFICATIONS_DB:-dnquest_notifications}
      POSTGRES_USER: ${POSTGRES_USER:-dn}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dn}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    ports:
      - "${POSTGRES_NOTIFICATIONS_PORT:-5437}:5432"
    volumes:
      - postgres_notifications_data:/var/lib/postgresql/data
    networks:
      - ${DOCKER_NETWORK:-dn-quest-network}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dn} -d ${POSTGRES_NOTIFICATIONS_DB:-dnquest_notifications}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  postgres-statistics:
    image: postgres:16-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-dn-quest}-postgres-statistics
    environment:
      POSTGRES_DB: ${POSTGRES_STATISTICS_DB:-dnquest_statistics}
      POSTGRES_USER: ${POSTGRES_USER:-dn}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dn}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    ports:
      - "${POSTGRES_STATISTICS_PORT:-5438}:5432"
    volumes:
      - postgres_statistics_data:/var/lib/postgresql/data
    networks:
      - ${DOCKER_NETWORK:-dn-quest-network}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dn} -d ${POSTGRES_STATISTICS_DB:-dnquest_statistics}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  postgres-files:
    image: postgres:16-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-dn-quest}-postgres-files
    environment:
      POSTGRES_DB: ${POSTGRES_FILES_DB:-dnquest_files}
      POSTGRES_USER: ${POSTGRES_USER:-dn}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dn}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    ports:
      - "${POSTGRES_FILES_PORT:-5439}:5432"
    volumes:
      - postgres_files_data:/var/lib/postgresql/data
    networks:
      - ${DOCKER_NETWORK:-dn-quest-network}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dn} -d ${POSTGRES_FILES_DB:-dnquest_files}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # Redis for caching and session management
  redis:
    image: redis:7-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-dn-quest}-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - ${DOCKER_NETWORK:-dn-quest-network}
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # Kafka for event-driven communication
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: ${COMPOSE_PROJECT_NAME:-dn-quest}-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_SYNC_LIMIT: 2
    networks:
      - ${DOCKER_NETWORK:-dn-quest-network}
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: ${COMPOSE_PROJECT_NAME:-dn-quest}-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "${KAFKA_PORT:-9092}:9092"
      - "9101:9101"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_JMX_PORT: 9101
      KAFKA_JMX_HOSTNAME: localhost
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: ${KAFKA_AUTO_CREATE_TOPICS_ENABLE:-true}
      KAFKA_DELETE_TOPIC_ENABLE: true
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - ${DOCKER_NETWORK:-dn-quest-network}
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # Kafka UI for management
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: ${COMPOSE_PROJECT_NAME:-dn-quest}-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "${KAFKA_UI_PORT:-8089}:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    networks:
      - ${DOCKER_NETWORK:-dn-quest-network}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # MinIO for file storage
  minio:
    image: minio/minio:latest
    container_name: ${COMPOSE_PROJECT_NAME:-dn-quest}-minio
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    networks:
      - ${DOCKER_NETWORK:-dn-quest-network}
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ===========================================
  # Microservices
  # ===========================================

  # API Gateway
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    image: ${DOCKER_REGISTRY:-dn-quest}/api-gateway:${DOCKER_TAG:-1.0.0}
    container_name: ${COMPOSE_PROJECT_NAME:-dn-quest}-api-gateway
    ports:
      - "${API_GATEWAY_PORT:-8080}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - ${DOCKER_NETWORK:-dn-quest-network}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # Authentication Service
  authentication-service:
    build:
      context: ./authentication-service
      dockerfile: Dockerfile
    image: ${DOCKER_REGISTRY:-dn-quest}/authentication-service:${DOCKER_TAG:-1.0.0}
    container_name: ${COMPOSE_PROJECT_NAME:-dn-quest}-authentication-service
    ports:
      - "${AUTHENTICATION_SERVICE_PORT:-8081}:8081"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      DATABASE_URL: jdbc:postgresql://postgres-auth:5432/${POSTGRES_AUTH_DB:-dnquest_auth}
      DATABASE_USERNAME: ${POSTGRES_USER:-dn}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-dn}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
    depends_on:
      postgres-auth:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - ${DOCKER_NETWORK:-dn-quest-network}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/api/auth/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # User Management Service
  user-management-service:
    build:
      context: ./user-management-service
      dockerfile: Dockerfile
    image: ${DOCKER_REGISTRY:-dn-quest}/user-management-service:${DOCKER_TAG:-1.0.0}
    container_name: ${COMPOSE_PROJECT_NAME:-dn-quest}-user-management-service
    ports:
      - "${USER_MANAGEMENT_SERVICE_PORT:-8082}:8082"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      DATABASE_URL: jdbc:postgresql://postgres-users:5432/${POSTGRES_USERS_DB:-dnquest_users}
      DATABASE_USERNAME: ${POSTGRES_USER:-dn}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-dn}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      AUTH_SERVICE_URL: http://authentication-service:8081
    depends_on:
      postgres-users:
        condition: service_healthy
      kafka:
        condition: service_healthy
      authentication-service:
        condition: service_healthy
    networks:
      - ${DOCKER_NETWORK:-dn-quest-network}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/api/users/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # Quest Management Service
  quest-management-service:
    build:
      context: ./quest-management-service
      dockerfile: Dockerfile
    image: ${DOCKER_REGISTRY:-dn-quest}/quest-management-service:${DOCKER_TAG:-1.0.0}
    container_name: ${COMPOSE_PROJECT_NAME:-dn-quest}-quest-management-service
    ports:
      - "${QUEST_MANAGEMENT_SERVICE_PORT:-8083}:8083"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      DATABASE_URL: jdbc:postgresql://postgres-quests:5432/${POSTGRES_QUESTS_DB:-dnquest_quests}
      DATABASE_USERNAME: ${POSTGRES_USER:-dn}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-dn}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      AUTH_SERVICE_URL: http://authentication-service:8081
      FILE_STORAGE_SERVICE_URL: http://file-storage-service:8088
    depends_on:
      postgres-quests:
        condition: service_healthy
      kafka:
        condition: service_healthy
      authentication-service:
        condition: service_healthy
    networks:
      - ${DOCKER_NETWORK:-dn-quest-network}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/api/quests/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # Game Engine Service
  game-engine-service:
    build:
      context: ./game-engine-service
      dockerfile: Dockerfile
    image: ${DOCKER_REGISTRY:-dn-quest}/game-engine-service:${DOCKER_TAG:-1.0.0}
    container_name: ${COMPOSE_PROJECT_NAME:-dn-quest}-game-engine-service
    ports:
      - "${GAME_ENGINE_SERVICE_PORT:-8084}:8084"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      DATABASE_URL: jdbc:postgresql://postgres-game:5432/${POSTGRES_GAME_DB:-dnquest_game}
      DATABASE_USERNAME: ${POSTGRES_USER:-dn}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-dn}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      AUTH_SERVICE_URL: http://authentication-service:8081
      QUEST_SERVICE_URL: http://quest-management-service:8083
      TEAM_SERVICE_URL: http://team-management-service:8085
    depends_on:
      postgres-game:
        condition: service_healthy
      kafka:
        condition: service_healthy
      authentication-service:
        condition: service_healthy
      quest-management-service:
        condition: service_healthy
      team-management-service:
        condition: service_healthy
    networks:
      - ${DOCKER_NETWORK:-dn-quest-network}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/api/game/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # Team Management Service
  team-management-service:
    build:
      context: ./team-management-service
      dockerfile: Dockerfile
    image: ${DOCKER_REGISTRY:-dn-quest}/team-management-service:${DOCKER_TAG:-1.0.0}
    container_name: ${COMPOSE_PROJECT_NAME:-dn-quest}-team-management-service
    ports:
      - "${TEAM_MANAGEMENT_SERVICE_PORT:-8085}:8085"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      DATABASE_URL: jdbc:postgresql://postgres-teams:5432/${POSTGRES_TEAMS_DB:-dnquest_teams}
      DATABASE_USERNAME: ${POSTGRES_USER:-dn}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-dn}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      AUTH_SERVICE_URL: http://authentication-service:8081
      USER_SERVICE_URL: http://user-management-service:8082
    depends_on:
      postgres-teams:
        condition: service_healthy
      kafka:
        condition: service_healthy
      authentication-service:
        condition: service_healthy
      user-management-service:
        condition: service_healthy
    networks:
      - ${DOCKER_NETWORK:-dn-quest-network}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/api/teams/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # Notification Service
  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    image: ${DOCKER_REGISTRY:-dn-quest}/notification-service:${DOCKER_TAG:-1.0.0}
    container_name: ${COMPOSE_PROJECT_NAME:-dn-quest}-notification-service
    ports:
      - "${NOTIFICATION_SERVICE_PORT:-8086}:8086"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      DATABASE_URL: jdbc:postgresql://postgres-notifications:5432/${POSTGRES_NOTIFICATIONS_DB:-dnquest_notifications}
      DATABASE_USERNAME: ${POSTGRES_USER:-dn}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-dn}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      AUTH_SERVICE_URL: http://authentication-service:8081
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
    depends_on:
      postgres-notifications:
        condition: service_healthy
      kafka:
        condition: service_healthy
      authentication-service:
        condition: service_healthy
    networks:
      - ${DOCKER_NETWORK:-dn-quest-network}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/api/notifications/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # Statistics Service
  statistics-service:
    build:
      context: ./statistics-service
      dockerfile: Dockerfile
    image: ${DOCKER_REGISTRY:-dn-quest}/statistics-service:${DOCKER_TAG:-1.0.0}
    container_name: ${COMPOSE_PROJECT_NAME:-dn-quest}-statistics-service
    ports:
      - "${STATISTICS_SERVICE_PORT:-8087}:8087"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      DATABASE_URL: jdbc:postgresql://postgres-statistics:5432/${POSTGRES_STATISTICS_DB:-dnquest_statistics}
      DATABASE_USERNAME: ${POSTGRES_USER:-dn}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-dn}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      AUTH_SERVICE_URL: http://authentication-service:8081
      GAME_SERVICE_URL: http://game-engine-service:8084
    depends_on:
      postgres-statistics:
        condition: service_healthy
      kafka:
        condition: service_healthy
      authentication-service:
        condition: service_healthy
      game-engine-service:
        condition: service_healthy
    networks:
      - ${DOCKER_NETWORK:-dn-quest-network}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8087/api/statistics/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # File Storage Service
  file-storage-service:
    build:
      context: ./file-storage-service
      dockerfile: Dockerfile
    image: ${DOCKER_REGISTRY:-dn-quest}/file-storage-service:${DOCKER_TAG:-1.0.0}
    container_name: ${COMPOSE_PROJECT_NAME:-dn-quest}-file-storage-service
    ports:
      - "${FILE_STORAGE_SERVICE_PORT:-8088}:8088"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      DATABASE_URL: jdbc:postgresql://postgres-files:5432/${POSTGRES_FILES_DB:-dnquest_files}
      DATABASE_USERNAME: ${POSTGRES_USER:-dn}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-dn}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME}
    depends_on:
      postgres-files:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - ${DOCKER_NETWORK:-dn-quest-network}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/api/files/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

# ===========================================
# Volumes
# ===========================================
volumes:
  postgres_auth_data:
    driver: local
  postgres_users_data:
    driver: local
  postgres_quests_data:
    driver: local
  postgres_game_data:
    driver: local
  postgres_teams_data:
    driver: local
  postgres_notifications_data:
    driver: local
  postgres_statistics_data:
    driver: local
  postgres_files_data:
    driver: local
  redis_data:
    driver: local
  kafka_data:
    driver: local
  minio_data:
    driver: local

# ===========================================
# Networks
# ===========================================
networks:
  ${DOCKER_NETWORK:-dn-quest-network}:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16