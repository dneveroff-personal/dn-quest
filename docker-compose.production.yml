    restart: always
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 512M
          cpus: '0.25'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ===========================================
# Volumes
# ===========================================
volumes:
  postgres_auth_data:
    driver: local
  postgres_users_data:
    driver: local
  postgres_quests_data:
    driver: local
  postgres_game_data:
    driver: local
  postgres_teams_data:
    driver: local
  postgres_notifications_data:
    driver: local
  postgres_statistics_data:
    driver: local
  postgres_files_data:
    driver: local
  redis_data:
    driver: local
  kafka_data:
    driver: local
  zookeeper_data:
    driver: local
  zookeeper_logs:
    driver: local
  minio_data:
    driver: local

# ===========================================
# Networks
# ===========================================
networks:
  ${DOCKER_NETWORK:-dn-quest-network}:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/16
    driver_opts:
      com.docker.network.bridge.name: dn-quest-prod