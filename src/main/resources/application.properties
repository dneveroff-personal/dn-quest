## Common ##
spring.application.name=dn-quest
# Show message if error
server.error.include-message=always
server.error.include-binding-errors=always

## Security ##
# JWT Configuration
JWT_SECRET=${JWT_SECRET:dnQuestSecretKey2024ForDevelopmentOnlyChangeInProduction}
JWT_EXPIRATION_MS=${JWT_EXPIRATION_MS:86400000}

# Session Configuration
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=strict

## Cache ##
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=10000, expireAfterWrite=10m

## Database ##
# Optional for modern Spring
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:dn}
spring.datasource.password=${DB_PASSWORD:dn}
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/dnqdb}

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

spring.jpa.hibernate.ddl-auto=update
# To see SQL queries
#spring.jpa.show-sql=true

# Connection Pool
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.pool-name=DNQuestHikariCP
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.connection-timeout=20000

