# Spring Security
spring.security.user.name=dn
spring.security.user.password=dn

# Logging
logging.level.dn.quest=INFO
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG

# Telegram
telegram.bot.token=${BOT_TOKEN}
telegram.bot.username=DN_QuestBot