server:
  port: 8080

debug: true

spring:
  application:
    name: api-gateway

  security:
    user:
      name: admin
      password: admin

  # Disabled Zipkin and Sleuth to avoid connection errors
  # zipkin:
  #   base-url: ${ZIPKIN_URL:http://zipkin:9411}
  #   endpoint: ${ZIPKIN_URL:http://zipkin:9411}/api/v2/spans

  profiles:
    active: dev

  main:
    web-application-type: reactive

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.jdbc.DataSourceTransactionManagerAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration
      - org.springframework.boot.autoconfigure.data.jpa.JpaRepositoriesAutoConfiguration
      - org.springframework.boot.autoconfigure.web.servlet.WebMvcAutoConfiguration

  cloud:
    circuitbreaker:
      resilience4j:
        configs:
          default:
            time-limiter:
              timeout-duration: 5s
        circuitbreakers:
          authenticationService:
            time-limiter:
              timeout-duration: 10s
    gateway:
      # Global CORS configuration
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns:
              - "http://localhost:3000"   # фронтенд (dev)
              - "http://localhost:8080"   # gateway (dev)
              - "https://dn-quest.com"    # production
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600
      
      # Circuit breaker configuration
      default-filters:
        - name: CircuitBreaker
          args:
            name: default
            fallbackUri: forward:/fallback/general
        - name: Retry
          args:
            retries: 3
            backoff:
              firstBackoff: 50ms
              maxBackoff: 500ms
              factor: 2
            statuses:
              - BAD_GATEWAY
              - GATEWAY_TIMEOUT
              - INTERNAL_SERVER_ERROR
      
      # Load balancer configuration
      loadbalancer:
        configs:
          - default:
              retry:
                enabled: true
                retries: 3
                backoff:
                  firstBackoff: 50ms
                  maxBackoff: 500ms
                  factor: 2
                statuses:
                  - BAD_GATEWAY
                  - GATEWAY_TIMEOUT
  
  # Redis configuration for rate limiting
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:dnQuestSecretKeyForJWTTokenGenerationAndValidation2024}
  expiration: ${JWT_EXPIRATION:900000} # 15 minutes

# Services Configuration
services:
  authentication:
    url: ${AUTHENTICATION_SERVICE_URL:http://localhost:8081}
    health-url: ${AUTHENTICATION_HEALTH_URL:http://localhost:8081}
    timeout: 5000
  user-management:
    url: ${USER_MANAGEMENT_SERVICE_URL:http://localhost:8082}
    health-url: ${USER_MANAGEMENT_HEALTH_URL:http://localhost:8082}
    timeout: 5000
  quest-management:
    url: ${QUEST_MANAGEMENT_SERVICE_URL:http://localhost:8083}
    health-url: ${QUEST_MANAGEMENT_HEALTH_URL:http://localhost:8083}
    timeout: 5000
  game-engine:
    url: ${GAME_ENGINE_SERVICE_URL:http://localhost:8084}
    health-url: ${GAME_ENGINE_HEALTH_URL:http://localhost:8084}
    timeout: 5000
  team-management:
    url: ${TEAM_MANAGEMENT_SERVICE_URL:http://localhost:8085}
    health-url: ${TEAM_MANAGEMENT_HEALTH_URL:http://localhost:8085}
    timeout: 5000
  notification:
    url: ${NOTIFICATION_SERVICE_URL:http://localhost:8086}
    health-url: ${NOTIFICATION_HEALTH_URL:http://localhost:8086}
    timeout: 5000
  statistics:
    url: ${STATISTICS_SERVICE_URL:http://localhost:8087}
    health-url: ${STATISTICS_HEALTH_URL:http://localhost:8087}
    timeout: 5000
  file-storage:
    url: ${FILE_STORAGE_SERVICE_URL:http://localhost:8088}
    health-url: ${FILE_STORAGE_HEALTH_URL:http://localhost:8088}
    timeout: 5000

# Rate Limiting Configuration
rate-limiting:
  default:
    replenish-rate: 10
    burst-capacity: 20
  authentication:
    replenish-rate: 20
    burst-capacity: 40
  user-management:
    replenish-rate: 15
    burst-capacity: 30
  quest-management:
    replenish-rate: 25
    burst-capacity: 50
  game-engine:
    replenish-rate: 50
    burst-capacity: 100
  team-management:
    replenish-rate: 10
    burst-capacity: 20
  notification:
    replenish-rate: 100
    burst-capacity: 200
  statistics:
    replenish-rate: 5
    burst-capacity: 10
  file-storage:
    replenish-rate: 20
    burst-capacity: 40

# Management endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true
  tracing:
    enabled: true
    sampling:
      probability: 1.0
  otlp:
    enabled: true
    tracing:
      endpoint: http://jaeger-dev:4318/v1/traces
      protocol: http
      enabled: true
logging:
  level:
    dn.quest.gateway: INFO
    org.springframework.cloud.gateway: DEBUG
    org.springframework.web.reactive: DEBUG
    io.micrometer.tracing: DEBUG
    io.opentelemetry: DEBUG
    org.springframework.boot.actuate.autoconfigure.tracing: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

# OpenAPI documentation
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
  gateway:
    code-config:
      enabled: true

---
spring:
  config:
    activate:
      on-profile: dev

  
  cloud:
    gateway:
      # Маршруты настроены программно в FilterConfig.java
      # Для разработки используются local services, для production - service discovery
      # Routes are configured in FilterConfig.java
      default-filters:
        - name: CircuitBreaker
          args:
            name: default
            fallbackUri: forward:/fallback/general
        - name: Retry
          args:
            retries: 3
            backoff:
              firstBackoff: 50ms
              maxBackoff: 500ms
              factor: 2
            statuses:
              - BAD_GATEWAY
              - GATEWAY_TIMEOUT
              - INTERNAL_SERVER_ERROR

logging:
  level:
    dn.quest.gateway: DEBUG
    org.springframework.cloud.gateway: DEBUG

---
spring:
  config:
    activate:
      on-profile: prod
  
  cloud:
    gateway:
      # Маршруты настроены программно в FilterConfig.java
      # В production используется service discovery через lb://
      # Routes are configured in FilterConfig.java with service URLs from properties

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}

  jwt:
    secret: ${JWT_SECRET}
    expiration: ${JWT_EXPIRATION}

  logging:
    level:
      dn.quest.gateway: INFO
    file:
      name: /var/log/dn-quest/api-gateway.log

---
spring:
  config:
    activate:
      on-profile: test
  
  cloud:
    gateway:
      routes:
        # Test routes with mock services
        - id: authentication-service
          uri: http://test-auth-service:8081
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=1

logging:
  level:
    dn.quest.gateway: DEBUG