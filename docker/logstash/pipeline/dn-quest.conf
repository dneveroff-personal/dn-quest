# Logstash pipeline configuration for DN Quest
input {
  # Beats input for microservices logs
  beats {
    port => 5044
  }
  
  # TCP input for structured logs
  tcp {
    port => 5000
    codec => json_lines
  }
  
  # UDP input for high-volume logs
  udp {
    port => 5001
    codec => json_lines
  }
}

filter {
  # Parse JSON logs
  if [message] {
    json {
      source => "message"
      target => "parsed"
    }
  }
  
  # Extract service name from various sources
  if [fields][service] {
    mutate {
      add_field => { "service" => "%{[fields][service]}" }
    }
  } else if [parsed][service] {
    mutate {
      add_field => { "service" => "%{[parsed][service]}" }
    }
  } else if [log][file][path] =~ /([a-z-]+)-service/ {
    grok {
      match => { "[log][file][path]" => "/(?<service>[a-z-]+)-service/" }
    }
  }
  
  # Extract log level
  if [parsed][level] {
    mutate {
      add_field => { "level" => "%{[parsed][level]}" }
    }
  } else if [log][level] {
    mutate {
      add_field => { "level" => "%{[log][level]}" }
    }
  } else if [message] =~ /(TRACE|DEBUG|INFO|WARN|ERROR|FATAL)/ {
    grok {
      match => { "message" => "(?<level>TRACE|DEBUG|INFO|WARN|ERROR|FATAL)" }
    }
  }
  
  # Extract trace and span IDs for distributed tracing
  if [parsed][trace_id] {
    mutate {
      add_field => { "trace_id" => "%{[parsed][trace_id]}" }
    }
  }
  
  if [parsed][span_id] {
    mutate {
      add_field => { "span_id" => "%{[parsed][span_id]}" }
    }
  }
  
  # Extract user ID from various sources
  if [parsed][user_id] {
    mutate {
      add_field => { "user_id" => "%{[parsed][user_id]}" }
    }
  } else if [user][id] {
    mutate {
      add_field => { "user_id" => "%{[user][id]}" }
    }
  }
  
  # Extract request ID
  if [parsed][request_id] {
    mutate {
      add_field => { "request_id" => "%{[parsed][request_id]}" }
    }
  }
  
  # Parse HTTP request information
  if [parsed][http] {
    mutate {
      add_field => { "http" => "%{[parsed][http]}" }
    }
  }
  
  # Parse JVM metrics
  if [parsed][jvm] {
    mutate {
      add_field => { "jvm" => "%{[parsed][jvm]}" }
    }
  }
  
  # Parse database metrics
  if [parsed][database] {
    mutate {
      add_field => { "database" => "%{[parsed][database]}" }
    }
  }
  
  # Parse Kafka metrics
  if [parsed][kafka] {
    mutate {
      add_field => { "kafka" => "%{[parsed][kafka]}" }
    }
  }
  
  # Parse exception information
  if [parsed][exception] {
    mutate {
      add_field => { "exception" => "%{[parsed][exception]}" }
    }
  } else if [message] =~ /Exception/ {
    grok {
      match => { 
        "message" => "(?<exception_class>[a-zA-Z0-9.$_]+Exception): (?<exception_message>.+)"
      }
    }
    
    # Extract stack trace
    if [message] =~ /\s+at\s+/ {
      mutate {
        add_field => { "stacktrace" => "%{message}" }
      }
    }
  }
  
  # Parse timestamp
  if [parsed][timestamp] {
    date {
      match => [ "[parsed][timestamp]", "ISO8601" ]
      target => "@timestamp"
    }
  } else if [timestamp] {
    date {
      match => [ "timestamp", "ISO8601" ]
      target => "@timestamp"
    }
  }
  
  # Add environment information
  if [fields][environment] {
    mutate {
      add_field => { "environment" => "%{[fields][environment]}" }
    }
  } else {
    mutate {
      add_field => { "environment" => "development" }
    }
  }
  
  # Add cluster information
  mutate {
    add_field => { "cluster" => "dn-quest" }
  }
  
  # Clean up fields
  mutate {
    remove_field => [ "parsed", "host", "agent", "ecs", "input", "log" ]
  }
  
  # Convert log levels to standard format
  if [level] == "WARN" {
    mutate {
      replace => { "level" => "WARNING" }
    }
  }
  
  if [level] == "FATAL" {
    mutate {
      replace => { "level" => "ERROR" }
    }
  }
  
  # Add geoip information if available
  if [client][ip] {
    geoip {
      source => "[client][ip]"
      target => "geoip"
    }
  }
  
  # Add user agent parsing if available
  if [user_agent] {
    useragent {
      source => "user_agent"
      target => "user_agent_parsed"
    }
  }
}

output {
  # Output to Elasticsearch with different indices based on service
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "dn-quest-%{service}-%{+YYYY.MM.dd}"
    template_name => "dn-quest"
    template_pattern => "dn-quest-*"
    template => "/usr/share/logstash/templates/dn-quest-template.json"
    template_overwrite => true
  }
  
  # Debug output (remove in production)
  if [@metadata][debug] {
    stdout {
      codec => rubydebug
    }
  }
}