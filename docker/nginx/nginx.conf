# DN Quest Nginx Configuration
# Main configuration file for load balancing and reverse proxy

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

# Events configuration
events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

# HTTP configuration
http {
    # Basic settings
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    # Log format
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';
    
    log_format detailed '$remote_addr - $remote_user [$time_local] "$request" '
                       '$status $body_bytes_sent "$http_referer" '
                       '"$http_user_agent" "$http_x_forwarded_for" '
                       'rt=$request_time uct="$upstream_connect_time" '
                       'uht="$upstream_header_time" urt="$upstream_response_time" '
                       'cs=$upstream_cache_status';
    
    access_log /var/log/nginx/access.log main;
    
    # Performance settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;
    
    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=upload:10m rate=2r/s;
    
    # Connection limiting
    limit_conn_zone $binary_remote_addr zone=conn_limit_per_ip:10m;
    
    # Upstream configurations
    upstream api_gateway {
        least_conn;
        server api-gateway:8080 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }
    
    upstream authentication_service {
        least_conn;
        server authentication-service:8081 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }
    
    upstream user_management_service {
        least_conn;
        server user-management-service:8082 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }
    
    upstream quest_management_service {
        least_conn;
        server quest-management-service:8083 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }
    
    upstream game_engine_service {
        least_conn;
        server game-engine-service:8084 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }
    
    upstream team_management_service {
        least_conn;
        server team-management-service:8085 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }
    
    upstream notification_service {
        least_conn;
        server notification-service:8086 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }
    
    upstream statistics_service {
        least_conn;
        server statistics-service:8087 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }
    
    upstream file_storage_service {
        least_conn;
        server file-storage-service:8088 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }
    
    upstream frontend_servers {
        least_conn;
        server frontend:3000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }
    
    # Monitoring upstreams
    upstream prometheus {
        server prometheus:9090 max_fails=3 fail_timeout=30s;
    }
    
    upstream grafana {
        server grafana:3000 max_fails=3 fail_timeout=30s;
    }
    
    upstream jaeger {
        server jaeger:16686 max_fails=3 fail_timeout=30s;
    }
    
    upstream kibana {
        server kibana:5601 max_fails=3 fail_timeout=30s;
    }
    
    # Include additional configuration files
    include /etc/nginx/conf.d/*.conf;
}