# Prometheus configuration for DN Quest microservices
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'dn-quest'
    environment: '${ENVIRONMENT:-development}'

# Rule files
rule_files:
  - "rules/*.yml"

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

# Scrape configurations
scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    scrape_interval: 30s
    metrics_path: '/metrics'

  # API Gateway
  - job_name: 'api-gateway'
    static_configs:
      - targets: ['api-gateway:8080']
    scrape_interval: 15s
    metrics_path: '/actuator/prometheus'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'api-gateway'

  # Authentication Service
  - job_name: 'authentication-service'
    static_configs:
      - targets: ['authentication-service:8081']
    scrape_interval: 15s
    metrics_path: '/api/auth/actuator/prometheus'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'authentication-service'

  # User Management Service
  - job_name: 'user-management-service'
    static_configs:
      - targets: ['user-management-service:8082']
    scrape_interval: 15s
    metrics_path: '/api/users/actuator/prometheus'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'user-management-service'

  # Quest Management Service
  - job_name: 'quest-management-service'
    static_configs:
      - targets: ['quest-management-service:8083']
    scrape_interval: 15s
    metrics_path: '/api/quests/actuator/prometheus'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'quest-management-service'

  # Game Engine Service
  - job_name: 'game-engine-service'
    static_configs:
      - targets: ['game-engine-service:8084']
    scrape_interval: 15s
    metrics_path: '/api/game/actuator/prometheus'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'game-engine-service'

  # Team Management Service
  - job_name: 'team-management-service'
    static_configs:
      - targets: ['team-management-service:8085']
    scrape_interval: 15s
    metrics_path: '/api/teams/actuator/prometheus'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'team-management-service'

  # Notification Service
  - job_name: 'notification-service'
    static_configs:
      - targets: ['notification-service:8086']
    scrape_interval: 15s
    metrics_path: '/api/notifications/actuator/prometheus'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'notification-service'

  # Statistics Service
  - job_name: 'statistics-service'
    static_configs:
      - targets: ['statistics-service:8087']
    scrape_interval: 15s
    metrics_path: '/api/statistics/actuator/prometheus'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'statistics-service'

  # File Storage Service
  - job_name: 'file-storage-service'
    static_configs:
      - targets: ['file-storage-service:8088']
    scrape_interval: 15s
    metrics_path: '/api/files/actuator/prometheus'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'file-storage-service'

  # Node Exporter
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 30s
    metrics_path: '/metrics'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'docker-host'

  # cAdvisor
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
    scrape_interval: 30s
    metrics_path: '/metrics'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'docker-cadvisor'

  # Redis Exporter
  - job_name: 'redis-exporter'
    static_configs:
      - targets: ['redis:6379']
    scrape_interval: 30s
    metrics_path: '/metrics'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'redis'

  # PostgreSQL Exporter
  - job_name: 'postgres-exporter'
    static_configs:
      - targets: 
        - 'postgres-auth:9187'
        - 'postgres-users:9187'
        - 'postgres-quests:9187'
        - 'postgres-game:9187'
        - 'postgres-teams:9187'
        - 'postgres-notifications:9187'
        - 'postgres-statistics:9187'
        - 'postgres-files:9187'
    scrape_interval: 30s
    metrics_path: '/metrics'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '([^:]+):.*'
        replacement: '${1}'

  # Kafka Exporter
  - job_name: 'kafka-exporter'
    static_configs:
      - targets: ['kafka:9308']
    scrape_interval: 30s
    metrics_path: '/metrics'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'kafka'

  # MinIO Exporter
  - job_name: 'minio-exporter'
    static_configs:
      - targets: ['minio:9000']
    scrape_interval: 30s
    metrics_path: '/minio/v2/metrics/cluster'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'minio'

  # Nginx Exporter
  - job_name: 'nginx-exporter'
    static_configs:
      - targets: ['nginx:9113']
    scrape_interval: 30s
    metrics_path: '/metrics'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'nginx'

  # Elasticsearch Exporter
  - job_name: 'elasticsearch-exporter'
    static_configs:
      - targets: ['elasticsearch:9200']
    scrape_interval: 30s
    metrics_path: '/_prometheus/metrics'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'elasticsearch'

  # Kibana Exporter
  - job_name: 'kibana-exporter'
    static_configs:
      - targets: ['kibana:5601']
    scrape_interval: 30s
    metrics_path: '/api/status'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'kibana'

