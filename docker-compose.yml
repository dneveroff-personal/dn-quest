version: '3.8'

services:
  db:
    image: postgres:16
    container_name: quiz-db
    environment:
      POSTGRES_USER: dn
      POSTGRES_PASSWORD: dn
      POSTGRES_DB: quizdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    container_name: quiz-app
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/quizdb
      SPRING_DATASOURCE_USERNAME: dn
      SPRING_DATASOURCE_PASSWORD: dn
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect

volumes:
  pgdata:
