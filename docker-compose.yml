services:
  db:
    image: postgres:16
    container_name: quiz-db
    environment:
      POSTGRES_USER: dn
      POSTGRES_PASSWORD: dn
      POSTGRES_DB: quizdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    container_name: quiz-app
    depends_on:
      - db
    ports:
      - "8080:8080"
      - "5005:5005"   # <-- добавляем порт для отладки
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/quizdb
      SPRING_DATASOURCE_USERNAME: dn
      SPRING_DATASOURCE_PASSWORD: dn
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect

  pgadmin:
    image: dpage/pgadmin4
    container_name: quiz-pgadmin
    depends_on:
      - db
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@localhost.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  pgdata:
  pgadmin_data:
