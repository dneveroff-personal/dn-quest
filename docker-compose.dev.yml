      LOGGING_LEVEL_DN_QUEST_STATISTICS: DEBUG
    volumes:
      - statistics_service_dev_logs:/app/logs
    depends_on:
      postgres-dev:
        condition: service_healthy
      kafka-dev:
        condition: service_healthy
      authentication-service-dev:
        condition: service_started
    networks:
      - dn-quest-dev-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8087/api/stats/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  file-storage-service-dev:
    build:
      context: .
      dockerfile: ./Dockerfile
      args:
        SERVICE_NAME: file-storage-service
        PORT: 8088
    image: dn-quest/file-storage-service:dev
    container_name: dn-quest-file-storage-service-dev
    ports:
      - "${FILE_STORAGE_SERVICE_DEV_PORT:-8088}:8088"
      - "${FILE_STORAGE_SERVICE_DEBUG_PORT:-5013}:5005"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DATABASE_URL: jdbc:postgresql://postgres-dev:5432/${POSTGRES_FILES_DB:-dnquest_files}
      DATABASE_USERNAME: ${POSTGRES_USER:-dn}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-dn}
      KAFKA_BOOTSTRAP_SERVERS: kafka-dev:29092
      KAFKA_TOPICS_REPLICATION_FACTOR: 1
      KAFKA_TOPICS_PARTITIONS_DEFAULT: 1
      MINIO_ENDPOINT: http://minio-dev:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME:-dn-quest-files}
      FILE_UPLOAD_ALLOWED_TYPES: image/jpeg,image/jpg,image/png,image/gif,image/webp,image/svg+xml,video/mp4,video/avi,video/mov,audio/mp3,audio/wav,audio/ogg,application/pdf
      FILE_UPLOAD_ALLOWED_EXTENSIONS: jpg,jpeg,png,gif,webp,svg,mp4,avi,mov,mp3,wav,ogg,pdf
      JAVA_OPTS: "-Xms256m -Xmx512m -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005"
      LOGGING_LEVEL_DN_QUEST_FILESTORAGE: DEBUG
    volumes:
      - file_storage_service_dev_logs:/app/logs
    depends_on:
      postgres-dev:
        condition: service_healthy
      minio-dev:
        condition: service_healthy
      kafka-dev:
        condition: service_healthy
    networks:
      - dn-quest-dev-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8088/api/files/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # Frontend — собирается отдельно, свой Dockerfile в ./frontend/
  frontend-dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: dn-quest/frontend:dev
    container_name: dn-quest-frontend-dev
    ports:
      - "${FRONTEND_DEV_PORT:-3000}:80"
    environment:
      NODE_ENV: development
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
      VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:8080}
      VITE_MINIO_URL: ${VITE_MINIO_URL:-http://localhost:9000}
    volumes:
      - frontend_dev_node_modules:/app/node_modules
    networks:
      - dn-quest-dev-network
    depends_on:
      - api-gateway-dev
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

# ======================
# Volumes
