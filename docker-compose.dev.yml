      - "${QUEST_MANAGEMENT_SERVICE_DEBUG_PORT:-5008}:5005"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DATABASE_URL: jdbc:postgresql://postgres-dev:5432/${POSTGRES_QUESTS_DB:-dnquest_quests}
      DATABASE_USERNAME: ${POSTGRES_USER:-dn}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-dn}
      KAFKA_BOOTSTRAP_SERVERS: kafka-dev:29092
      KAFKA_TOPICS_REPLICATION_FACTOR: 1
      KAFKA_TOPICS_PARTITIONS_DEFAULT: 1
      AUTH_SERVICE_URL: http://authentication-service-dev:8081
      FILE_STORAGE_SERVICE_URL: http://file-storage-service-dev:8088
      JAVA_OPTS: "-Xms256m -Xmx512m -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005"
      LOGGING_LEVEL_DN_QUEST_QUESTMANAGEMENT: DEBUG
    volumes:
      - quest_management_service_dev_logs:/app/logs
    depends_on:
      postgres-dev:
        condition: service_healthy
      kafka-dev:
        condition: service_healthy
      authentication-service-dev:
        condition: service_started
    networks:
      - dn-quest-dev-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8083/api/quests/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  game-engine-service-dev:
    build:
      context: .
      dockerfile: ./Dockerfile
      args:
        SERVICE_NAME: game-engine-service
        PORT: 8084
    image: dn-quest/game-engine-service:dev
    container_name: dn-quest-game-engine-service-dev
    ports:
      - "${GAME_ENGINE_SERVICE_DEV_PORT:-8084}:8084"
      - "${GAME_ENGINE_SERVICE_DEBUG_PORT:-5009}:5005"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DATABASE_URL: jdbc:postgresql://postgres-dev:5432/${POSTGRES_GAME_DB:-dnquest_game}
      DATABASE_USERNAME: ${POSTGRES_USER:-dn}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-dn}
      KAFKA_BOOTSTRAP_SERVERS: kafka-dev:29092
      KAFKA_TOPICS_REPLICATION_FACTOR: 1
      KAFKA_TOPICS_PARTITIONS_DEFAULT: 1
      REDIS_HOST: redis-dev
      REDIS_PORT: 6379
      AUTH_SERVICE_URL: http://authentication-service-dev:8081
      QUEST_SERVICE_URL: http://quest-management-service-dev:8083
      TEAM_SERVICE_URL: http://team-management-service-dev:8085
      JAVA_OPTS: "-Xms256m -Xmx512m -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005"
      LOGGING_LEVEL_DN_QUEST_GAMEENGINE: DEBUG
    volumes:
      - game_engine_service_dev_logs:/app/logs
    depends_on:
      postgres-dev:
        condition: service_healthy
      kafka-dev:
        condition: service_healthy
      authentication-service-dev:
        condition: service_started
    networks:
      - dn-quest-dev-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8084/api/game/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  team-management-service-dev:
    build:
      context: .
      dockerfile: ./Dockerfile
      args:
        SERVICE_NAME: team-management-service
        PORT: 8085
    image: dn-quest/team-management-service:dev
    container_name: dn-quest-team-management-service-dev
    ports:
      - "${TEAM_MANAGEMENT_SERVICE_DEV_PORT:-8085}:8085"
      - "${TEAM_MANAGEMENT_SERVICE_DEBUG_PORT:-5010}:5005"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DATABASE_URL: jdbc:postgresql://postgres-dev:5432/${POSTGRES_TEAMS_DB:-dnquest_teams}
      DATABASE_USERNAME: ${POSTGRES_USER:-dn}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-dn}
      KAFKA_BOOTSTRAP_SERVERS: kafka-dev:29092
      KAFKA_TOPICS_REPLICATION_FACTOR: 1
      KAFKA_TOPICS_PARTITIONS_DEFAULT: 1
      AUTH_SERVICE_URL: http://authentication-service-dev:8081
      USER_SERVICE_URL: http://user-management-service-dev:8082
      REDIS_HOST: redis-dev
      REDIS_PORT: 6379
      JAVA_OPTS: "-Xms256m -Xmx512m -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005"
      LOGGING_LEVEL_DN_QUEST_TEAMMANAGEMENT: DEBUG
    volumes:
      - team_management_service_dev_logs:/app/logs
    depends_on:
      postgres-dev:
        condition: service_healthy
      kafka-dev:
        condition: service_healthy
      redis-dev:
        condition: service_healthy
      authentication-service-dev:
        condition: service_started
    networks:
      - dn-quest-dev-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8085/api/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  notification-service-dev:
    build:
      context: .
      dockerfile: ./Dockerfile
      args:
        SERVICE_NAME: notification-service
        PORT: 8086
    image: dn-quest/notification-service:dev
    container_name: dn-quest-notification-service-dev
    ports:
      - "${NOTIFICATION_SERVICE_DEV_PORT:-8086}:8086"
      - "${NOTIFICATION_SERVICE_DEBUG_PORT:-5011}:5005"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      KAFKA_BOOTSTRAP_SERVERS: kafka-dev:29092
      KAFKA_TOPICS_REPLICATION_FACTOR: 1
      KAFKA_TOPICS_PARTITIONS_DEFAULT: 1
      AUTH_SERVICE_URL: http://authentication-service-dev:8081
      SMTP_HOST: ${SMTP_HOST:-smtp.mailtrap.io}
      SMTP_PORT: ${SMTP_PORT:-2525}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      JAVA_OPTS: "-Xms256m -Xmx512m -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005"
      LOGGING_LEVEL_DN_QUEST_NOTIFICATION: DEBUG
    volumes:
      - notification_service_dev_logs:/app/logs
    depends_on:
      kafka-dev:
        condition: service_healthy
      authentication-service-dev:
        condition: service_started
    networks:
      - dn-quest-dev-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8086/api/notifications/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  statistics-service-dev:
    build:
      context: .
      dockerfile: ./Dockerfile
      args:
        SERVICE_NAME: statistics-service
        PORT: 8087
    image: dn-quest/statistics-service:dev
    container_name: dn-quest-statistics-service-dev
    ports:
      - "${STATISTICS_SERVICE_DEV_PORT:-8087}:8087"
      - "${STATISTICS_SERVICE_DEBUG_PORT:-5012}:5005"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DATABASE_URL: jdbc:postgresql://postgres-dev:5432/${POSTGRES_STATISTICS_DB:-dnquest_statistics}
      DATABASE_USERNAME: ${POSTGRES_USER:-dn}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-dn}
      KAFKA_BOOTSTRAP_SERVERS: kafka-dev:29092
      KAFKA_TOPICS_REPLICATION_FACTOR: 1
      KAFKA_TOPICS_PARTITIONS_DEFAULT: 1
      AUTH_SERVICE_URL: http://authentication-service-dev:8081
      GAME_SERVICE_URL: http://game-engine-service-dev:8084
