version: '3.8'

# DN Quest - Конфигурация для разработки
# Этот файл содержит оптимизированную конфигурацию для локальной разработки

services:
  # ===========================================
  # Упрощенная инфраструктура для разработки
  # ===========================================

  # PostgreSQL - одна база данных для всех сервисов (для упрощения)
  postgres-dev:
    image: postgres:16-alpine
    container_name: dn-quest-postgres-dev
    environment:
      POSTGRES_DB: ${POSTGRES_DEV_DB:-dnquest_dev}
      POSTGRES_USER: ${POSTGRES_USER:-dn}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dn}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    ports:
      - "${POSTGRES_DEV_PORT:-5432}:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./docker/postgres/dev/init:/docker-entrypoint-initdb.d
    networks:
      - dn-quest-dev-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dn} -d ${POSTGRES_DEV_DB:-dnquest_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # Redis для кэширования
  redis-dev:
    image: redis:7-alpine
    container_name: dn-quest-redis-dev
    ports:
      - "${REDIS_DEV_PORT:-6379}:6379"
    volumes:
      - redis_dev_data:/data
      - ./docker/redis/dev/redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - dn-quest-dev-network
    command: redis-server /usr/local/etc/redis/redis.conf --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # Kafka (упрощенная конфигурация)
  zookeeper-dev:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: dn-quest-zookeeper-dev
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - dn-quest-dev-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  kafka-dev:
    image: confluentinc/cp-kafka:7.5.0
    container_name: dn-quest-kafka-dev
    depends_on:
      zookeeper-dev:
        condition: service_healthy
    ports:
      - "${KAFKA_DEV_PORT:-9092}:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper-dev:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-dev:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: true
      KAFKA_DELETE_TOPIC_ENABLE: true
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_LOG_SEGMENT_BYTES: 1048576
    volumes:
      - kafka_dev_data:/var/lib/kafka/data
    networks:
      - dn-quest-dev-network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # MinIO для файлового хранилища
  minio-dev:
    image: minio/minio:latest
    container_name: dn-quest-minio-dev
    ports:
      - "${MINIO_DEV_PORT:-9000}:9000"
      - "${MINIO_DEV_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_dev_data:/data
    networks:
      - dn-quest-dev-network
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # ===========================================
  # Микросервисы с hot reload и debug
  # ===========================================

  # API Gateway с hot reload
  api-gateway-dev:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile.dev
    image: dn-quest/api-gateway:dev
    container_name: dn-quest-api-gateway-dev
    ports:
      - "${API_GATEWAY_DEV_PORT:-8080}:8080"
      - "${API_GATEWAY_DEBUG_PORT:-5005}:5005"  # Debug порт
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DEVTOOLS_RESTART_ENABLED: true
      SPRING_DEVTOOLS_LIVERELOAD_ENABLED: true
      REDIS_HOST: redis-dev
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-dnQuestSecretKeyForJWTTokenGenerationAndValidation2024}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:8080}
      AUTHENTICATION_SERVICE_URL: http://authentication-service-dev:8081
      USER_MANAGEMENT_SERVICE_URL: http://user-management-service-dev:8082
      QUEST_MANAGEMENT_SERVICE_URL: http://quest-management-service-dev:8083
      GAME_ENGINE_SERVICE_URL: http://game-engine-service-dev:8084
      TEAM_MANAGEMENT_SERVICE_URL: http://team-management-service-dev:8085
      NOTIFICATION_SERVICE_URL: http://notification-service-dev:8086
      STATISTICS_SERVICE_URL: http://statistics-service-dev:8087
      FILE_STORAGE_SERVICE_URL: http://file-storage-service-dev:8088
      # Debug настройки
      JAVA_OPTS: "-Xms256m -Xmx512m -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005"
      # Логирование для разработки
      LOGGING_LEVEL_ROOT: DEBUG
      LOGGING_LEVEL_DN_QUEST_GATEWAY: DEBUG
      LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_WEB: DEBUG
      LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_CLOUD: DEBUG
    volumes:
      - ./api-gateway/src:/app/src
      - ./api-gateway/build.gradle.kts:/app/build.gradle.kts
      - ./dn-quest-shared:/app/dn-quest-shared
      - api_gateway_dev_logs:/app/logs
    depends_on:
      redis-dev:
        condition: service_healthy
    networks:
      - dn-quest-dev-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # Authentication Service с hot reload
  authentication-service-dev:
    build:
      context: ./authentication-service
      dockerfile: Dockerfile.dev
    image: dn-quest/authentication-service:dev
    container_name: dn-quest-authentication-service-dev
    ports:
      - "${AUTHENTICATION_SERVICE_DEV_PORT:-8081}:8081"
      - "${AUTHENTICATION_SERVICE_DEBUG_PORT:-5006}:5005"  # Debug порт
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DEVTOOLS_RESTART_ENABLED: true
      SPRING_DEVTOOLS_LIVERELOAD_ENABLED: true
      DATABASE_URL: jdbc:postgresql://postgres-dev:5432/${POSTGRES_DEV_DB:-dnquest_dev}
      DATABASE_USERNAME: ${POSTGRES_USER:-dn}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-dn}
      KAFKA_BOOTSTRAP_SERVERS: kafka-dev:29092
      JWT_SECRET: ${JWT_SECRET:-dnQuestSecretKeyForJWTTokenGenerationAndValidation2024}
      JWT_ACCESS_EXPIRATION: ${JWT_ACCESS_EXPIRATION:-900000}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-604800000}
      JWT_ISSUER: ${JWT_ISSUER:-dn-quest-auth-service}
      # Debug настройки
      JAVA_OPTS: "-Xms256m -Xmx512m -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005"
      # Логирование для разработки
      LOGGING_LEVEL_ROOT: DEBUG
      LOGGING_LEVEL_DN_QUEST_AUTHENTICATION: DEBUG
      LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY: DEBUG
      LOGGING_LEVEL_ORG_HIBERNATE_SQL: DEBUG
      LOGGING_LEVEL_ORG_HIBERNATE_TYPE_DESCRIPTOR_SQL_BASICBINDER: TRACE
    volumes:
      - ./authentication-service/src:/app/src
      - ./authentication-service/build.gradle.kts:/app/build.gradle.kts
      - ./dn-quest-shared:/app/dn-quest-shared
      - authentication_service_dev_logs:/app/logs
    depends_on:
      postgres-dev:
        condition: service_healthy
      kafka-dev:
        condition: service_healthy
    networks:
      - dn-quest-dev-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/api/auth/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # User Management Service с hot reload
  user-management-service-dev:
    build:
      context: ./user-management-service
      dockerfile: Dockerfile.dev
    image: dn-quest/user-management-service:dev
    container_name: dn-quest-user-management-service-dev
    ports:
      - "${USER_MANAGEMENT_SERVICE_DEV_PORT:-8082}:8082"
      - "${USER_MANAGEMENT_SERVICE_DEBUG_PORT:-5007}:5005"  # Debug порт
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DEVTOOLS_RESTART_ENABLED: true
      SPRING_DEVTOOLS_LIVERELOAD_ENABLED: true
      DATABASE_URL: jdbc:postgresql://postgres-dev:5432/${POSTGRES_DEV_DB:-dnquest_dev}
      DATABASE_USERNAME: ${POSTGRES_USER:-dn}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-dn}
      KAFKA_BOOTSTRAP_SERVERS: kafka-dev:29092
      AUTH_SERVICE_URL: http://authentication-service-dev:8081
      # Debug настройки
      JAVA_OPTS: "-Xms256m -Xmx512m -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005"
      # Логирование для разработки
      LOGGING_LEVEL_ROOT: DEBUG
      LOGGING_LEVEL_DN_QUEST_USERMANAGEMENT: DEBUG
    volumes:
      - ./user-management-service/src:/app/src
      - ./user-management-service/build.gradle.kts:/app/build.gradle.kts
      - ./dn-quest-shared:/app/dn-quest-shared
      - user_management_service_dev_logs:/app/logs
    depends_on:
      postgres-dev:
        condition: service_healthy
      kafka-dev:
        condition: service_healthy
      authentication-service-dev:
        condition: service_healthy
    networks:
      - dn-quest-dev-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/api/users/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # Quest Management Service с hot reload
  quest-management-service-dev:
    build:
      context: ./quest-management-service
      dockerfile: Dockerfile.dev
    image: dn-quest/quest-management-service:dev
    container_name: dn-quest-quest-management-service-dev
    ports:
      - "${QUEST_MANAGEMENT_SERVICE_DEV_PORT:-8083}:8083"
      - "${QUEST_MANAGEMENT_SERVICE_DEBUG_PORT:-5008}:5005"  # Debug порт
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DEVTOOLS_RESTART_ENABLED: true
      SPRING_DEVTOOLS_LIVERELOAD_ENABLED: true
      DATABASE_URL: jdbc:postgresql://postgres-dev:5432/${POSTGRES_DEV_DB:-dnquest_dev}
      DATABASE_USERNAME: ${POSTGRES_USER:-dn}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-dn}
      KAFKA_BOOTSTRAP_SERVERS: kafka-dev:29092
      AUTH_SERVICE_URL: http://authentication-service-dev:8081
      FILE_STORAGE_SERVICE_URL: http://file-storage-service-dev:8088
      # Debug настройки
      JAVA_OPTS: "-Xms256m -Xmx512m -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005"
      # Логирование для разработки
      LOGGING_LEVEL_ROOT: DEBUG
      LOGGING_LEVEL_DN_QUEST_QUESTMANAGEMENT: DEBUG
    volumes:
      - ./quest-management-service/src:/app/src
      - ./quest-management-service/build.gradle.kts:/app/build.gradle.kts
      - ./dn-quest-shared:/app/dn-quest-shared
      - quest_management_service_dev_logs:/app/logs
    depends_on:
      postgres-dev:
        condition: service_healthy
      kafka-dev:
        condition: service_healthy
      authentication-service-dev:
        condition: service_healthy
      file-storage-service-dev:
        condition: service_healthy
    networks:
      - dn-quest-dev-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/api/quests/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # Game Engine Service с hot reload
  game-engine-service-dev:
    build:
      context: ./game-engine-service
      dockerfile: Dockerfile.dev
    image: dn-quest/game-engine-service:dev
    container_name: dn-quest-game-engine-service-dev
    ports:
      - "${GAME_ENGINE_SERVICE_DEV_PORT:-8084}:8084"
      - "${GAME_ENGINE_SERVICE_DEBUG_PORT:-5009}:5005"  # Debug порт
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DEVTOOLS_RESTART_ENABLED: true
      SPRING_DEVTOOLS_LIVERELOAD_ENABLED: true
      DATABASE_URL: jdbc:postgresql://postgres-dev:5432/${POSTGRES_DEV_DB:-dnquest_dev}
      DATABASE_USERNAME: ${POSTGRES_USER:-dn}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-dn}
      KAFKA_BOOTSTRAP_SERVERS: kafka-dev:29092
      AUTH_SERVICE_URL: http://authentication-service-dev:8081
      QUEST_SERVICE_URL: http://quest-management-service-dev:8083
      TEAM_SERVICE_URL: http://team-management-service-dev:8085
      # Debug настройки
      JAVA_OPTS: "-Xms256m -Xmx512m -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005"
      # Логирование для разработки
      LOGGING_LEVEL_ROOT: DEBUG
      LOGGING_LEVEL_DN_QUEST_GAMEENGINE: DEBUG
    volumes:
      - ./game-engine-service/src:/app/src
      - ./game-engine-service/build.gradle.kts:/app/build.gradle.kts
      - ./dn-quest-shared:/app/dn-quest-shared
      - game_engine_service_dev_logs:/app/logs
    depends_on:
      postgres-dev:
        condition: service_healthy
      kafka-dev:
        condition: service_healthy
      authentication-service-dev:
        condition: service_healthy
      quest-management-service-dev:
        condition: service_healthy
      team-management-service-dev:
        condition: service_healthy
    networks:
      - dn-quest-dev-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/api/game/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # Team Management Service с hot reload
  team-management-service-dev:
    build:
      context: ./team-management-service
      dockerfile: Dockerfile.dev
    image: dn-quest/team-management-service:dev
    container_name: dn-quest-team-management-service-dev
    ports:
      - "${TEAM_MANAGEMENT_SERVICE_DEV_PORT:-8085}:8085"
      - "${TEAM_MANAGEMENT_SERVICE_DEBUG_PORT:-5010}:5005"  # Debug порт
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DEVTOOLS_RESTART_ENABLED: true
      SPRING_DEVTOOLS_LIVERELOAD_ENABLED: true
      DATABASE_URL: jdbc:postgresql://postgres-dev:5432/${POSTGRES_DEV_DB:-dnquest_dev}
      DATABASE_USERNAME: ${POSTGRES_USER:-dn}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-dn}
      KAFKA_BOOTSTRAP_SERVERS: kafka-dev:29092
      AUTH_SERVICE_URL: http://authentication-service-dev:8081
      USER_SERVICE_URL: http://user-management-service-dev:8082
      # Debug настройки
      JAVA_OPTS: "-Xms256m -Xmx512m -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005"
      # Логирование для разработки
      LOGGING_LEVEL_ROOT: DEBUG
      LOGGING_LEVEL_DN_QUEST_TEAMMANAGEMENT: DEBUG
    volumes:
      - ./team-management-service/src:/app/src
      - ./team-management-service/build.gradle.kts:/app/build.gradle.kts
      - ./dn-quest-shared:/app/dn-quest-shared
      - team_management_service_dev_logs:/app/logs
    depends_on:
      postgres-dev:
        condition: service_healthy
      kafka-dev:
        condition: service_healthy
      authentication-service-dev:
        condition: service_healthy
      user-management-service-dev:
        condition: service_healthy
    networks:
      - dn-quest-dev-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/api/teams/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # Notification Service с hot reload
  notification-service-dev:
    build:
      context: ./notification-service
      dockerfile: Dockerfile.dev
    image: dn-quest/notification-service:dev
    container_name: dn-quest-notification-service-dev
    ports:
      - "${NOTIFICATION_SERVICE_DEV_PORT:-8086}:8086"
      - "${NOTIFICATION_SERVICE_DEBUG_PORT:-5011}:5005"  # Debug порт
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DEVTOOLS_RESTART_ENABLED: true
      SPRING_DEVTOOLS_LIVERELOAD_ENABLED: true
      DATABASE_URL: jdbc:postgresql://postgres-dev:5432/${POSTGRES_DEV_DB:-dnquest_dev}
      DATABASE_USERNAME: ${POSTGRES_USER:-dn}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-dn}
      KAFKA_BOOTSTRAP_SERVERS: kafka-dev:29092
      AUTH_SERVICE_URL: http://authentication-service-dev:8081
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      # Debug настройки
      JAVA_OPTS: "-Xms256m -Xmx512m -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005"
      # Логирование для разработки
      LOGGING_LEVEL_ROOT: DEBUG
      LOGGING_LEVEL_DN_QUEST_NOTIFICATION: DEBUG
    volumes:
      - ./notification-service/src:/app/src
      - ./notification-service/build.gradle.kts:/app/build.gradle.kts
      - ./dn-quest-shared:/app/dn-quest-shared
      - notification_service_dev_logs:/app/logs
    depends_on:
      postgres-dev:
        condition: service_healthy
      kafka-dev:
        condition: service_healthy
      authentication-service-dev:
        condition: service_healthy
    networks:
      - dn-quest-dev-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/api/notifications/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # Statistics Service с hot reload
  statistics-service-dev:
    build:
      context: ./statistics-service
      dockerfile: Dockerfile.dev
    image: dn-quest/statistics-service:dev
    container_name: dn-quest-statistics-service-dev
    ports:
      - "${STATISTICS_SERVICE_DEV_PORT:-8087}:8087"
      - "${STATISTICS_SERVICE_DEBUG_PORT:-5012}:5005"  # Debug порт
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DEVTOOLS_RESTART_ENABLED: true
      SPRING_DEVTOOLS_LIVERELOAD_ENABLED: true
      DATABASE_URL: jdbc:postgresql://postgres-dev:5432/${POSTGRES_DEV_DB:-dnquest_dev}
      DATABASE_USERNAME: ${POSTGRES_USER:-dn}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-dn}
      KAFKA_BOOTSTRAP_SERVERS: kafka-dev:29092
      AUTH_SERVICE_URL: http://authentication-service-dev:8081
      GAME_SERVICE_URL: http://game-engine-service-dev:8084
      # Debug настройки
      JAVA_OPTS: "-Xms256m -Xmx512m -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005"
      # Логирование для разработки
      LOGGING_LEVEL_ROOT: DEBUG
      LOGGING_LEVEL_DN_QUEST_STATISTICS: DEBUG
    volumes:
      - ./statistics-service/src:/app/src
      - ./statistics-service/build.gradle.kts:/app/build.gradle.kts
      - ./dn-quest-shared:/app/dn-quest-shared
      - statistics_service_dev_logs:/app/logs
    depends_on:
      postgres-dev:
        condition: service_healthy
      kafka-dev:
        condition: service_healthy
      authentication-service-dev:
        condition: service_healthy
      game-engine-service-dev:
        condition: service_healthy
    networks:
      - dn-quest-dev-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8087/api/statistics/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # File Storage Service с hot reload
  file-storage-service-dev:
    build:
      context: ./file-storage-service
      dockerfile: Dockerfile.dev
    image: dn-quest/file-storage-service:dev
    container_name: dn-quest-file-storage-service-dev
    ports:
      - "${FILE_STORAGE_SERVICE_DEV_PORT:-8088}:8088"
      - "${FILE_STORAGE_SERVICE_DEBUG_PORT:-5013}:5005"  # Debug порт
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DEVTOOLS_RESTART_ENABLED: true
      SPRING_DEVTOOLS_LIVERELOAD_ENABLED: true
      DATABASE_URL: jdbc:postgresql://postgres-dev:5432/${POSTGRES_DEV_DB:-dnquest_dev}
      DATABASE_USERNAME: ${POSTGRES_USER:-dn}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-dn}
      KAFKA_BOOTSTRAP_SERVERS: kafka-dev:29092
      MINIO_ENDPOINT: http://minio-dev:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME:-dn-quest-files}
      # Debug настройки
      JAVA_OPTS: "-Xms256m -Xmx512m -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005"
      # Логирование для разработки
      LOGGING_LEVEL_ROOT: DEBUG
      LOGGING_LEVEL_DN_QUEST_FILESTORAGE: DEBUG
    volumes:
      - ./file-storage-service/src:/app/src
      - ./file-storage-service/build.gradle.kts:/app/build.gradle.kts
      - ./dn-quest-shared:/app/dn-quest-shared
      - file_storage_service_dev_logs:/app/logs
    depends_on:
      postgres-dev:
        condition: service_healthy
      minio-dev:
        condition: service_healthy
      kafka-dev:
        condition: service_healthy
    networks:
      - dn-quest-dev-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/api/files/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # Frontend с hot reload
  frontend-dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    image: dn-quest/frontend:dev
    container_name: dn-quest-frontend-dev
    ports:
      - "${FRONTEND_DEV_PORT:-3000}:3000"
    environment:
      NODE_ENV: development
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
      VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:8080}
      VITE_MINIO_URL: ${VITE_MINIO_URL:-http://localhost:9000}
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/package.json:/app/package.json
      - ./frontend/vite.config.js:/app/vite.config.js
      - ./frontend/index.html:/app/index.html
      - frontend_dev_node_modules:/app/node_modules
    networks:
      - dn-quest-dev-network
    depends_on:
      - api-gateway-dev
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

# ===========================================
# Volumes для разработки
# ===========================================
volumes:
  postgres_dev_data:
    driver: local
  redis_dev_data:
    driver: local
  kafka_dev_data:
    driver: local
  minio_dev_data:
    driver: local
  api_gateway_dev_logs:
    driver: local
  authentication_service_dev_logs:
    driver: local
  user_management_service_dev_logs:
    driver: local
  quest_management_service_dev_logs:
    driver: local
  game_engine_service_dev_logs:
    driver: local
  team_management_service_dev_logs:
    driver: local
  notification_service_dev_logs:
    driver: local
  statistics_service_dev_logs:
    driver: local
  file_storage_service_dev_logs:
    driver: local
  frontend_dev_node_modules:
    driver: local

# ===========================================
# Networks для разработки
# ===========================================
networks:
  dn-quest-dev-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.23.0.0/16