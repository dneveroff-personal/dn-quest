version: '3.8'

services:
  # Backend в режиме разработки
  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: quest-backend-dev
    ports:
      - "${BACKEND_PORT:-8080}:8080"
      - "${DEBUG_PORT:-5004}:5004"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-dnqdb}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-dn}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-dn}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "true"
      SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL: "true"
      # JWT настройки
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key-12345}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      # Telegram бот
      BOT_TOKEN: ${BOT_TOKEN:-}
      # Логирование
      LOGGING_LEVEL_ROOT: DEBUG
      LOGGING_LEVEL_DN_QUEST: DEBUG
      # Actuator
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "*"
      MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: always
    env_file:
      - ${PWD}/.env
    volumes:
      - ./src:/app/src
      - ./build:/app/build
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # Frontend в режиме разработки
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: quest-frontend-dev
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    environment:
      NODE_ENV: development
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080/api}
      VITE_APP_TITLE: ${VITE_APP_TITLE:-DN Quest (Dev)}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped

  # PostgreSQL с настройками для разработки
  db:
    image: postgres:16-alpine
    container_name: quest-db-dev
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dn}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dn}
      POSTGRES_DB: ${POSTGRES_DB:-dnqdb}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dn} -d ${POSTGRES_DB:-dnqdb}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  pgdata_dev:
    driver: local

networks:
  default:
    name: quest-dev-network
    driver: bridge