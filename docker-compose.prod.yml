# ===========================================
# Production Volumes
# ===========================================
volumes:
  postgres_auth_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${POSTGRES_DATA_PATH:-/var/lib/dn-quest/data/postgres/auth}
  postgres_users_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${POSTGRES_DATA_PATH:-/var/lib/dn-quest/data/postgres/users}
  postgres_quests_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${POSTGRES_DATA_PATH:-/var/lib/dn-quest/data/postgres/quests}
  postgres_game_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${POSTGRES_DATA_PATH:-/var/lib/dn-quest/data/postgres/game}
  postgres_teams_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${POSTGRES_DATA_PATH:-/var/lib/dn-quest/data/postgres/teams}
  postgres_notifications_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${POSTGRES_DATA_PATH:-/var/lib/dn-quest/data/postgres/notifications}
  postgres_statistics_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${POSTGRES_DATA_PATH:-/var/lib/dn-quest/data/postgres/statistics}
  postgres_files_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${POSTGRES_DATA_PATH:-/var/lib/dn-quest/data/postgres/files}
  redis_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${REDIS_DATA_PATH:-/var/lib/dn-quest/data/redis}
  kafka_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${KAFKA_DATA_PATH:-/var/lib/dn-quest/data/kafka}
  zookeeper_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${KAFKA_DATA_PATH:-/var/lib/dn-quest/data/zookeeper}
  zookeeper_logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${KAFKA_DATA_PATH:-/var/lib/dn-quest/data/zookeeper/logs}
  minio_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${MINIO_DATA_PATH:-/var/lib/dn-quest/data/minio}
  frontend_logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${LOGS_PATH:-/var/log/dn-quest}/frontend

# ===========================================
# Production Networks
# ===========================================
networks:
  ${DOCKER_NETWORK:-dn-quest-prod-network}:
    driver: bridge
    ipam:
      config:
        - subnet: 172.24.0.0/16
    driver_opts:
      com.docker.network.bridge.name: dn-quest-prod
      com.docker.network.bridge.enable_icc: "true"
      com.docker.network.bridge.enable_ip_masquerade: "true"
      com.docker.network.driver.mtu: "1500"