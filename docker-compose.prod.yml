version: '3.8'

# DN Quest - Production конфигурация
# Этот файл содержит production-optimized конфигурацию с security и performance enhancements

services:
  # ===========================================
  # Production Infrastructure Services
  # ===========================================

  # PostgreSQL базы данных для каждого микросервиса с production настройками
  postgres-auth:
    image: postgres:16-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-dn-quest}-postgres-auth
    environment:
      POSTGRES_DB: ${POSTGRES_AUTH_DB:-dnquest_auth}
      POSTGRES_USER: ${POSTGRES_USER:-dn_quest_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data
      - ./docker/postgres/production/init:/docker-entrypoint-initdb.d
      - ./docker/postgres/production/postgresql.conf:/etc/postgresql/postgresql.conf
      - ./docker/postgres/production/pg_hba.conf:/etc/postgresql/pg_hba.conf
    networks:
      - ${DOCKER_NETWORK:-dn-quest-prod-network}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dn_quest_user} -d ${POSTGRES_AUTH_DB:-dnquest_auth}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: always
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 1G
          cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /var/run/postgresql

  postgres-users:
    image: postgres:16-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-dn-quest}-postgres-users
    environment:
      POSTGRES_DB: ${POSTGRES_USERS_DB:-dnquest_users}
      POSTGRES_USER: ${POSTGRES_USER:-dn_quest_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_users_data:/var/lib/postgresql/data
      - ./docker/postgres/production/postgresql.conf:/etc/postgresql/postgresql.conf
      - ./docker/postgres/production/pg_hba.conf:/etc/postgresql/pg_hba.conf
    networks:
      - ${DOCKER_NETWORK:-dn-quest-prod-network}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dn_quest_user} -d ${POSTGRES_USERS_DB:-dnquest_users}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: always
    deploy:
