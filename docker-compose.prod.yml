    environment:
      POSTGRES_DB: ${POSTGRES_GAME_DB:-dnquest_game}
      POSTGRES_USER: ${POSTGRES_USER:-dn_quest_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_game_data:/var/lib/postgresql/data
      - ./docker/postgres/production/postgresql.conf:/etc/postgresql/postgresql.conf
      - ./docker/postgres/production/pg_hba.conf:/etc/postgresql/pg_hba.conf
    networks:
      - ${DOCKER_NETWORK:-dn-quest-prod-network}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dn_quest_user} -d ${POSTGRES_GAME_DB:-dnquest_game}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: always
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 1G
          cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /var/run/postgresql

  postgres-teams:
    image: postgres:16-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-dn-quest}-postgres-teams
    environment:
      POSTGRES_DB: ${POSTGRES_TEAMS_DB:-dnquest_teams}
      POSTGRES_USER: ${POSTGRES_USER:-dn_quest_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_teams_data:/var/lib/postgresql/data
      - ./docker/postgres/production/postgresql.conf:/etc/postgresql/postgresql.conf
      - ./docker/postgres/production/pg_hba.conf:/etc/postgresql/pg_hba.conf
    networks:
      - ${DOCKER_NETWORK:-dn-quest-prod-network}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dn_quest_user} -d ${POSTGRES_TEAMS_DB:-dnquest_teams}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: always
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 1G
          cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /var/run/postgresql

  postgres-notifications:
    image: postgres:16-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-dn-quest}-postgres-notifications
    environment:
      POSTGRES_DB: ${POSTGRES_NOTIFICATIONS_DB:-dnquest_notifications}
      POSTGRES_USER: ${POSTGRES_USER:-dn_quest_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_notifications_data:/var/lib/postgresql/data
      - ./docker/postgres/production/postgresql.conf:/etc/postgresql/postgresql.conf
      - ./docker/postgres/production/pg_hba.conf:/etc/postgresql/pg_hba.conf
    networks:
