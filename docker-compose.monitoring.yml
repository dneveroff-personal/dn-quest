version: '3.8'

# DN Quest Monitoring Stack
# This file contains all monitoring and observability components

services:
  # ===========================================
  # Monitoring Infrastructure
  # ===========================================

  # Prometheus - Metrics Collection
  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: dn-quest-prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./docker/prometheus/prometheus-enhanced.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=15d'
      - '--storage.tsdb.retention.size=10GB'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    networks:
      - dn-quest-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 1G
          cpus: '0.5'

  # AlertManager - Alert Management
  alertmanager:
    image: prom/alertmanager:v0.25.0
    container_name: dn-quest-alertmanager
    ports:
      - "${ALERTMANAGER_PORT:-9093}:9093"
    volumes:
      - ./docker/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.external-url=http://localhost:9093'
      - '--web.route-prefix=/'
    networks:
      - dn-quest-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'

  # Grafana - Visualization
  grafana:
    image: grafana/grafana:10.0.0
    container_name: dn-quest-grafana
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: grafana-clock-panel,grafana-simple-json-datasource,grafana-piechart-panel
      GF_USERS_ALLOW_SIGN_UP: false
      GF_SMTP_ENABLED: true
      GF_SMTP_HOST: ${SMTP_HOST:-localhost:587}
      GF_SMTP_USER: ${SMTP_USERNAME:-}
      GF_SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      GF_SMTP_FROM_ADDRESS: ${SMTP_FROM:-alerts@dn-quest.com}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - dn-quest-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 512M
          cpus: '0.25'

  # ===========================================
  # Logging Infrastructure (ELK Stack)
  # ===========================================

  # Elasticsearch - Log Storage
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.8.0
    container_name: dn-quest-elasticsearch
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
      - xpack.security.enabled=false
      - xpack.monitoring.collection.enabled=true
    ports:
      - "${ELASTICSEARCH_PORT:-9200}:9200"
      - "9300:9300"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
      - ./docker/elasticsearch/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml:ro
    networks:
      - dn-quest-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 1G
          cpus: '0.5'

  # Logstash - Log Processing
  logstash:
    image: docker.elastic.co/logstash/logstash:8.8.0
    container_name: dn-quest-logstash
    ports:
      - "5044:5044"  # Beats input
      - "5000:5000"  # TCP input
      - "5001:5001"  # UDP input
      - "9600:9600"  # API
    environment:
      LS_JAVA_OPTS: "-Xmx1g -Xms1g"
    volumes:
      - ./docker/logstash/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
      - ./docker/logstash/pipeline:/usr/share/logstash/pipeline:ro
      - logstash_data:/usr/share/logstash/data
    networks:
      - dn-quest-network
    depends_on:
      - elasticsearch
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1.5G
          cpus: '0.5'
        reservations:
          memory: 1G
          cpus: '0.25'

  # Kibana - Log Visualization
  kibana:
    image: docker.elastic.co/kibana/kibana:8.8.0
    container_name: dn-quest-kibana
    ports:
      - "${KIBANA_PORT:-5601}:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
      SERVER_NAME: dn-quest-kibana
    volumes:
      - ./docker/kibana/kibana.yml:/usr/share/kibana/config/kibana.yml:ro
      - kibana_data:/usr/share/kibana/data
    networks:
      - dn-quest-network
    depends_on:
      - elasticsearch
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 512M
          cpus: '0.25'

  # ===========================================
  # Distributed Tracing
  # ===========================================

  # Jaeger - Distributed Tracing
  jaeger:
    image: jaegertracing/all-in-one:1.47
    container_name: dn-quest-jaeger
    ports:
      - "${JAEGER_UI_PORT:-16686}:16686"  # Jaeger UI
      - "14268:14268"  # HTTP collector
      - "14250:14250"  # gRPC collector
      - "6831:6831"    # UDP agent
      - "6832:6832"    # UDP agent
    environment:
      COLLECTOR_ZIPKIN_HOST_PORT: :9411
      SPAN_STORAGE_TYPE: elasticsearch
      ES_SERVER_URLS: http://elasticsearch:9200
      ES_INDEX_PREFIX: dn-quest-jaeger
    volumes:
      - ./docker/jaeger/jaeger.yml:/etc/jaeger/jaeger.yml:ro
    networks:
      - dn-quest-network
    depends_on:
      - elasticsearch
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 512M
          cpus: '0.25'

  # ===========================================
  # Infrastructure Monitoring
  # ===========================================

  # Node Exporter - System Metrics
  node-exporter:
    image: prom/node-exporter:v1.6.0
    container_name: dn-quest-node-exporter
    ports:
      - "9100:9100"
    command:
      - '--path.rootfs=/host'
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /:/host:ro,rslave
    networks:
      - dn-quest-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.1'
        reservations:
          memory: 64M
          cpus: '0.05'

  # cAdvisor - Container Metrics
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.0
    container_name: dn-quest-cadvisor
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    privileged: true
    devices:
      - /dev/kmsg
    networks:
      - dn-quest-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.2'
        reservations:
          memory: 128M
          cpus: '0.1'

  # Redis Exporter
  redis-exporter:
    image: oliver006/redis_exporter:v1.44.0
    container_name: dn-quest-redis-exporter
    ports:
      - "9121:9121"
    environment:
      REDIS_ADDR: redis://redis:6379
    networks:
      - dn-quest-network
    depends_on:
      - redis
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.1'
        reservations:
          memory: 64M
          cpus: '0.05'

  # PostgreSQL Exporters
  postgres-auth-exporter:
    image: prometheuscommunity/postgres-exporter:v0.12.0
    container_name: dn-quest-postgres-auth-exporter
    ports:
      - "9187:9187"
    environment:
      DATA_SOURCE_NAME: postgresql://dn:dn@postgres-auth:5432/dnquest_auth?sslmode=disable
    networks:
      - dn-quest-network
    depends_on:
      - postgres-auth
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.1'
        reservations:
          memory: 64M
          cpus: '0.05'

  postgres-users-exporter:
    image: prometheuscommunity/postgres-exporter:v0.12.0
    container_name: dn-quest-postgres-users-exporter
    ports:
      - "9188:9187"
    environment:
      DATA_SOURCE_NAME: postgresql://dn:dn@postgres-users:5432/dnquest_users?sslmode=disable
    networks:
      - dn-quest-network
    depends_on:
      - postgres-users
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.1'
        reservations:
          memory: 64M
          cpus: '0.05'

  postgres-quests-exporter:
    image: prometheuscommunity/postgres-exporter:v0.12.0
    container_name: dn-quest-postgres-quests-exporter
    ports:
      - "9189:9187"
    environment:
      DATA_SOURCE_NAME: postgresql://dn:dn@postgres-quests:5432/dnquest_quests?sslmode=disable
    networks:
      - dn-quest-network
    depends_on:
      - postgres-quests
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.1'
        reservations:
          memory: 64M
          cpus: '0.05'

  postgres-game-exporter:
    image: prometheuscommunity/postgres-exporter:v0.12.0
    container_name: dn-quest-postgres-game-exporter
    ports:
      - "9190:9187"
    environment:
      DATA_SOURCE_NAME: postgresql://dn:dn@postgres-game:5432/dnquest_game?sslmode=disable
    networks:
      - dn-quest-network
    depends_on:
      - postgres-game
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.1'
        reservations:
          memory: 64M
          cpus: '0.05'

  postgres-teams-exporter:
    image: prometheuscommunity/postgres-exporter:v0.12.0
    container_name: dn-quest-postgres-teams-exporter
    ports:
      - "9191:9187"
    environment:
      DATA_SOURCE_NAME: postgresql://dn:dn@postgres-teams:5432/dnquest_teams?sslmode=disable
    networks:
      - dn-quest-network
    depends_on:
      - postgres-teams
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.1'
        reservations:
          memory: 64M
          cpus: '0.05'

  postgres-notifications-exporter:
    image: prometheuscommunity/postgres-exporter:v0.12.0
    container_name: dn-quest-postgres-notifications-exporter
    ports:
      - "9192:9187"
    environment:
      DATA_SOURCE_NAME: postgresql://dn:dn@postgres-notifications:5432/dnquest_notifications?sslmode=disable
    networks:
      - dn-quest-network
    depends_on:
      - postgres-notifications
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.1'
        reservations:
          memory: 64M
          cpus: '0.05'

  postgres-statistics-exporter:
    image: prometheuscommunity/postgres-exporter:v0.12.0
    container_name: dn-quest-postgres-statistics-exporter
    ports:
      - "9193:9187"
    environment:
      DATA_SOURCE_NAME: postgresql://dn:dn@postgres-statistics:5432/dnquest_statistics?sslmode=disable
    networks:
      - dn-quest-network
    depends_on:
      - postgres-statistics
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.1'
        reservations:
          memory: 64M
          cpus: '0.05'

  postgres-files-exporter:
    image: prometheuscommunity/postgres-exporter:v0.12.0
    container_name: dn-quest-postgres-files-exporter
    ports:
      - "9194:9187"
    environment:
      DATA_SOURCE_NAME: postgresql://dn:dn@postgres-files:5432/dnquest_files?sslmode=disable
    networks:
      - dn-quest-network
    depends_on:
      - postgres-files
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.1'
        reservations:
          memory: 64M
          cpus: '0.05'

  # Kafka Exporter
  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.6.0
    container_name: dn-quest-kafka-exporter
    ports:
      - "9308:9308"
    environment:
      KAFKA_BROKERS: kafka:29092
    networks:
      - dn-quest-network
    depends_on:
      - kafka
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.2'
        reservations:
          memory: 128M
          cpus: '0.1'

  # Elasticsearch Exporter
  elasticsearch-exporter:
    image: prometheuscommunity/elasticsearch-exporter:v1.5.0
    container_name: dn-quest-elasticsearch-exporter
    ports:
      - "9114:9114"
    environment:
      ES_URI: http://elasticsearch:9200
    networks:
      - dn-quest-network
    depends_on:
      - elasticsearch
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.1'
        reservations:
          memory: 64M
          cpus: '0.05'

  # Nginx Exporter
  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:0.11.0
    container_name: dn-quest-nginx-exporter
    ports:
      - "9113:9113"
    command:
      - '--nginx.scrape-uri=http://nginx:80/nginx_status'
    networks:
      - dn-quest-network
    depends_on:
      - nginx
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.1'
        reservations:
          memory: 32M
          cpus: '0.05'

# ===========================================
# Volumes
# ===========================================
volumes:
  prometheus_data:
    driver: local
  alertmanager_data:
    driver: local
  grafana_data:
    driver: local
  elasticsearch_data:
    driver: local
  logstash_data:
    driver: local
  kibana_data:
    driver: local

# ===========================================
# Networks
# ===========================================
networks:
  dn-quest-network:
    external: true